<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Move On Step</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Move On Step" />
    <meta name="theme-color" content="#f6f7f4" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png" />
    <link rel="stylesheet" href="./styles.css?v=2" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="brand">
          <h1>Move On Step</h1>
        </div>
        <div class="summary" aria-live="polite">
          <span id="summaryCount">0 задач</span>
          <strong id="summaryProgress">0%</strong>
        </div>
      </header>

      <section class="tasks-section" aria-label="Список задач">
        <div id="tasksList" class="tasks-list"></div>

        <div id="emptyState" class="empty-state">
          <div class="empty-icon" aria-hidden="true">✓</div>
          <h2>Пока задач нет</h2>
          <p>Нажмите кнопку ниже, чтобы создать задачу с периодом и количеством пунктов.</p>
        </div>
      </section>
    </main>

    <button id="openTaskForm" class="floating-add" type="button">+ Добавить задачу</button>

    <div id="taskSheet" class="sheet" hidden>
      <div class="sheet-backdrop" data-close-sheet></div>
      <section class="sheet-panel" aria-label="Форма добавления задачи">
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="sheet-head">
          <div>
            <p class="eyebrow">Новая задача</p>
            <h2>Добавить задачу</h2>
          </div>
          <button class="icon-button" type="button" data-close-sheet aria-label="Закрыть форму">×</button>
        </div>

        <form id="taskForm" class="form">
          <label>
            Название задачи
            <input id="taskTitle" type="text" placeholder="Например: тренировки" required />
          </label>

          <div>
            <p class="field-title">Быстрый период</p>
            <div class="period-options" role="group" aria-label="Выбор периода">
              <button class="period-option is-active" type="button" data-period="month">Месяц</button>
              <button class="period-option" type="button" data-period="year">Год</button>
              <button class="period-option" type="button" data-period="custom">Свои даты</button>
            </div>
          </div>

          <div class="date-grid">
            <label>
              Дата начала
              <input id="startDate" type="date" required />
            </label>
            <label>
              Дата конца
              <input id="endDate" type="date" required />
            </label>
          </div>

          <label>
            Количество пунктов
            <input id="taskTotal" type="number" min="1" max="999" value="5" required />
          </label>

          <button class="primary-button" type="submit">Создать задачу</button>
        </form>
      </section>
    </div>

    <template id="taskTemplate">
      <article class="task-card">
        <div class="task-top">
          <div>
            <div class="task-title-row">
              <h2 class="task-title"></h2>
              <span class="task-status"></span>
            </div>
            <p class="task-period"></p>
          </div>
          <span class="deadline-indicator" aria-hidden="true">
            <span class="deadline-indicator__face">
              <span class="deadline-hand deadline-hand-hour"></span>
              <span class="deadline-hand deadline-hand-minute"></span>
            </span>
          </span>
          <button class="delete-button" type="button" data-action="delete" aria-label="Удалить задачу">×</button>
        </div>

        <div class="task-progress-row">
          <strong class="task-counter"></strong>
          <span class="task-percent"></span>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill"></div>
          <div class="clock">
  <svg width="40" height="40">
    <circle class="bg" cx="20" cy="20" r="16"></circle>
    <circle class="progress" cx="20" cy="20" r="16"></circle>
  </svg>
  <div class="center-dot"></div>
  <div class="hand"></div>
</div>
        </div>

        <div class="task-actions">
          <button class="step-button" type="button" data-action="decrement" aria-label="Уменьшить выполненные пункты">-</button>
          <button class="step-button step-button-primary" type="button" data-action="increment" aria-label="Добавить выполненный пункт">+</button>
        </div>
      </article>
    </template>

    <script src="./app.js?v=2"></script>
  </body>
</html>
